name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/public-web/**'
      - 'packages/@doc/ui/**'
      - 'packages/@doc/domain/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build public site for static export
        env:
          NEXT_OUTPUT_EXPORT: 'true'
        run: pnpm --filter @doc/public-web run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './apps/public-web/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
