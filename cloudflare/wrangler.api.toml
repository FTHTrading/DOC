name = "doc-api"
main = "apps/api/src/cloudflare-worker.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[routes]]
pattern = "api.doc.unykorn.org/*"
zone_name = "unykorn.org"

[vars]
APP_ENV = "production"
JWT_ISSUER = "doc-os"
JWT_AUDIENCE = "doc-clients"

[[durable_objects.bindings]]
name = "WALLET_SESSION_DO"
class_name = "WalletSessionDO"

[[durable_objects.bindings]]
name = "APPROVAL_ROOM_DO"
class_name = "ApprovalRoomDO"

[[r2_buckets]]
binding = "DOC_FILES"
bucket_name = "doc-os-files-prod"

[[queues.producers]]
binding = "ISSUANCE_QUEUE"
queue = "doc-issuance-prod"

[[queues.producers]]
binding = "PAYMENTS_QUEUE"
queue = "doc-payments-prod"

[[queues.producers]]
binding = "AI_QUEUE"
queue = "doc-ai-prod"

[[queues.producers]]
binding = "COMPLIANCE_QUEUE"
queue = "doc-compliance-prod"

[[queues.producers]]
binding = "NOTIFY_QUEUE"
queue = "doc-notify-prod"

[[hyperdrive]]
binding = "DOC_DB"
id = "<HYPERDRIVE_ID>"

[observability]
enabled = true

[placement]
mode = "smart"

[triggers]
crons = ["*/5 * * * *"]

[build]
command = "pnpm --filter @doc/api build:cf"
