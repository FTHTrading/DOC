services:
  postgres:
    image: postgres:16-alpine
    container_name: doc-postgres
    environment:
      POSTGRES_USER: doc
      POSTGRES_PASSWORD: doc_local_dev
      POSTGRES_DB: doc
    ports:
      - "${DOC_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doc-redis
    ports:
      - "${DOC_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
